<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tilt Article Selector</title>
    <link rel="stylesheet" href="style.css" />
    <script src="main.js" defer></script>
</head>

<body>
    <div id="start">
        <button id="permissionButton">Interaktion starten</button>
    </div>

    <div class="target" data-id="0"></div>
    <div class="label">Walking and Memory</div>

    <div class="target" data-id="1"></div>
    <div class="label">Walking and Knowledge</div>

    <div class="target" data-id="2"></div>
    <div class="label">Walking and Creativity</div>

    <div id="cursor"></div>

    <div id="preview">
        <strong id="previewTitle"></strong>
        <p id="previewText"></p>
        <div id="progress"></div>
    </div>
</body>

</html>
